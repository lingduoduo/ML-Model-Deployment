services:
  ai-dev:
    build:
      context: .
      # CPU image by default. For GPU, swap in Dockerfile.nvidia-container-toolkit
      # and add a deploy.resources block reserving an nvidia device (see README).
      dockerfile: Dockerfile
    image: ai-dev
    volumes:
      - ..:/workspace          # repo root
      - ~/models:/models
      - ~/datasets:/data
    ports:
      - "8888:8888"
    stdin_open: true
    tty: true
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: