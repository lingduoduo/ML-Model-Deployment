name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || 'ghcr.io/example/model-server' }}
  CHART_PATH: Helm-Chart/mychart
  RELEASE_NAME: model-release
  KUBE_NAMESPACE: model-serving

jobs:
  validate-helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: Validate Helm chart
        env:
          IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || 'ghcr.io/example/model-server' }}
          IMAGE_TAG: ${{ github.sha }}
        run: "${CHART_PATH}/scripts/verify-render.sh"
