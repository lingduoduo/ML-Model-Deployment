environment: dev
replicaCount: 1

# Override tag with an immutable image tag or digest in CI/CD.
image:
  repository: ghcr.io/example/model-server
  tag: latest

model:
  name: dev-model
  path: /models/model
  version: ""

# dev catalog: open read/write for developers (access enforced out-of-band).
modelStore:
  catalog: dev
  uri: s3://ml-dev/model-server

ingress:
  enabled: false

# Scheduled batch jobs (dev). Each entry renders a CronJob.
# The example runs a real job from the adp-recommender-system image
# (Recsys-Modeling-Pipeline): WORKDIR /app, package `recsys_framework` installed
# editable, invoked as a module. Add more entries by following the same contract
# (`python -m recsys_framework.<module>` or the `recsys-train <job>` console
# script). Jobs that write outside /tmp need extra volumes or a relaxed
# securityContext.readOnlyRootFilesystem.
scheduledJobs:
  # Every 8 hours — pick the best-scoring model from the MLOps experiment store.
  - name: select-best-model
    schedule: "0 */8 * * *"
    image: ghcr.io/example/adp-recommender-system:dev
    command: ["python", "-m"]
    args: ["recsys_framework.serving.select_best_model"]
    env:
      - name: PYTHONPATH
        value: /app
