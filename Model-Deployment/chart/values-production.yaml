replicaCount: 3

# Override tag with an immutable image tag or digest in CI/CD.
image:
  repository: ghcr.io/example/model-server
  tag: latest

model:
  name: production-model
  path: /models/model

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 2Gi
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 4Gi

# Health check configuration for production
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# Enable pod disruption budget for HA
podDisruptionBudget:
  enabled: true
  minAvailable: 2

environment: production

# prod catalog: restricted write (only prod-deployed code / CD service principal).
modelStore:
  catalog: prod
  uri: s3://ml-prod/model-server

# Online evaluation keeps the most accurate model serving as fresh data arrives.
onlineEval:
  enabled: true
  schedule: "0 * * * *"
  holdoutUri: s3://ml-prod/holdout
  driftAction: alert

modelGate:
  sla:
    medianLatencyMs: 150
    p95LatencyMs: 400
    p99LatencyMs: 700
    minQps: 100
    errorRateMax: 0.005
  load:
    peakQps: 300
    stress:
      enabled: true
      multiplier: 3
