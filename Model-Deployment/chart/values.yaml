# Deployment pattern: deploy-code | deploy-models
deploymentPattern: deploy-code

replicaCount: 1

image:
  repository: recsys-serve
  pullPolicy: IfNotPresent
  # Pin an immutable tag or digest per environment for safe rollbacks.
  # "latest" is a non-production default only.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations for tracking deployments and integrations
podAnnotations:
  prometheus.io/scrape: "false"
  # git.commit, build.number, deployment.timestamp added at deployment time

podLabels: {}

# When enabled, stamps each pod template with a render-time timestamp annotation.
# This makes every `helm upgrade` produce a new pod template, forcing a rollout.
# Disabled by default so renders are deterministic (no GitOps/ArgoCD drift, no
# rollout when nothing actually changed).
deployTimestamp:
  enabled: false

# Security context for pods and containers
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Writable scratch space mounted at /tmp.
# Required because readOnlyRootFilesystem is true by default.
# If your app writes outside /tmp, add those paths via volumes/volumeMounts
# or set securityContext.readOnlyRootFilesystem: false.
writableTmp:
  enabled: true
  # Node ephemeral storage cap for the /tmp emptyDir, e.g. 256Mi or 1Gi.
  sizeLimit: 1Gi

container:
  port: 8000
  command: []
  args: []
  workingDir: ""

model:
  # `name` selects which checkpoint the server loads. It is injected as the env
  # var named by `envVar` (default RECSYS_SERVE_MODEL for the recsys-serve app;
  # e.g. dssm, mlp_embedding). Set envVar to "" to omit the model env var.
  name: dssm
  envVar: RECSYS_SERVE_MODEL
  path: /models/model
  version: ""          # the model version to serve; bump to ship a new model
  pullPolicy: IfNotPresent

# Environment this release targets: dev | staging | production (set per env values file).
environment: ""

# Catalog-segregated model store (§4). When uri is set, an init container pulls
# <uri>/<model.version> into mountPath before the server starts.
modelStore:
  catalog: ""          # dev | staging | prod — must match `environment` (see validation)
  uri: ""              # backend-agnostic base, e.g. s3://ml-dev/model-server
  mountPath: /models   # where the model is placed for the server to read
  pullSecretName: ""   # optional credentials secret (mounted as envFrom on the init container)
  pullCommand: []      # override the pull command for your backend; default is a placeholder

env: []
# Example:
# env:
#   - name: LOG_LEVEL
#     value: info

envFrom: []
# Example:
# envFrom:
#   - configMapRef:
#       name: shared-model-config

configMap:
  enabled: false
  data: {}

secretEnv:
  enabled: false
  data: {}

persistence:
  enabled: false
  mountPath: /models
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

service:
  # ClusterIP is the recommended default.
  # Kubernetes will load-balance across healthy pod replicas behind this Service.
  # Use Ingress for external traffic and advanced routing. Use LoadBalancer only when needed.
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: model.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 1Gi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 2Gi
    # For GPU model serving, add a GPU limit directly under limits above, e.g.:
    #   nvidia.com/gpu: 1
# To schedule GPU pods onto GPU nodes, set the top-level nodeSelector and
# tolerations keys (defined near the end of this file), for example:
#   nodeSelector:
#     accelerator: nvidia
#   tolerations:
#     - key: nvidia.com/gpu
#       operator: Exists
#       effect: NoSchedule

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    # recsys-serve exposes /health but not /ready; reuse /health for readiness.
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

startupProbe:
  enabled: false
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget for high availability
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}
affinity: {}
tolerations: []
# Spread replicas across nodes for availability.
# The labelSelector is injected automatically from the chart's selector labels;
# do NOT add labelSelector here. Set to [] to disable.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
volumes: []
volumeMounts: []

# Model validation/comparison gate (§6). Enabled in the gating env per pattern:
# deploy-code => mode: compare in production; deploy-models => mode: validate in staging.
modelGate:
  enabled: false
  mode: ""             # validate | compare
  holdoutUri: ""       # dataset/metrics source for the check
  verdictSink: ""      # where pass/fail + metric deltas are written
  backoffLimit: 0
  command: []          # override to run real checks; default echoes the plan
  readinessChecks: true
  sla:
    medianLatencyMs: 0
    p95LatencyMs: 0
    p99LatencyMs: 0
    minQps: 0
    errorRateMax: 0
  load:
    peakQps: 0
    stress:
      enabled: false
      multiplier: 2

# Online model evaluation (§6a). Opt-in recurring re-score of the live model.
onlineEval:
  enabled: false
  schedule: "0 * * * *"
  holdoutUri: ""
  driftAction: alert   # alert | trigger-refresh

# Scheduled batch / model-training jobs. Each entry renders one CronJob.
# Empty by default (no CronJobs); populate per environment (see values-dev.yaml).
# Per-entry fields:
#   name             (required) — DNS-safe suffix; CronJob is <fullname>-<name>
#   schedule         (required) — standard cron expression
#   image            (optional) — defaults to the chart's serving image
#   command / args   (optional) — container entrypoint/args (lists)
#   env              (optional) — list of {name,value} env vars
#   resources        (optional) — defaults to .Values.resources
#   restartPolicy    (optional) — default OnFailure
#   concurrencyPolicy(optional) — default Forbid
#   backoffLimit     (optional) — default 0
#   suspend          (optional) — default false
scheduledJobs: []

# Real-time rollout strategy (§6b): gradual | ab-testing | shadow
rolloutStrategy: gradual
trafficRouting:
  provider: none       # none | istio | gateway-api
  abSplit: 50          # ab-testing: % of traffic to the challenger (canary)
  gradualSteps:        # gradual: % steps advanced as the gate passes
    - 10
    - 25
    - 50
    - 100
  challengerService: ""  # Service name of the canary/challenger release; defaults to <fullname>-canary
